[error_list]
0=成功。
1=命令不支持。
2=数据类型错误
3=数据范围错误
4=字段属性错误
5=必要字段缺失
6=数组越界
7=数组为空
8=字符串长度错误
9=逻辑错误（出现在告警设置和工作计划设置中，比如过压告警值小于过压恢复值或者工作计划中时间和调光数组长度不一致）"
10=参数存储错误
11=超时未回应
12=设备转发正忙
13=设备不支持转发功能
90=设备升级时，当前已是最新版本。
91=设备升级时，升级内容URL地址无效。
92=设备升级时，升级内容校验失败。
93=设备升级时，升级内容校验类型不支持。
94=设备升级时，升级类型不支持。
95=设备升级时，升级不被允许。例如非强制升级时，设备不允许升级。
96=设备升级时，升级内容错误。该错误可能是由于升级文件的内容或格式错误导致。
97=设备升级时，不存在申请对应的软硬件版本。
98=设备升级时，申请传输的包号无效。
99=设备升级时， Flash写入失败。
[set_flg]
rti_flg = True